name: Deploy web to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build engine (web imports it)
        run: npm run build --workspace @verdikt/engine

      - name: Build web app
        env:
          # Served from https://<user>.github.io/extension-audit/
          VITE_BASE: /extension-audit/
          # Optional: set repo variable VITE_PROXY_URL to your deployed Worker URL
          # to enable Web Store URL scanning. If unset, the URL tab is hidden.
          VITE_PROXY_URL: ${{ vars.VITE_PROXY_URL }}
        run: npm run build --workspace @verdikt/web

      - name: Add SPA 404 fallback
        run: cp packages/web/dist/index.html packages/web/dist/404.html

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
